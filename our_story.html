    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{

    .hero-bg{
      position:relative;
      min-height:800px;
      padding:3rem 1rem 0;

      overflow:hidden;

    .hero-bg::after{
      content:"";
      position:absolute;
      inset:auto 0 0 0;
      height:180px;
      background:linear-gradient(to bottom, rgba(255,255,255,0), rgba(236,235,234,1));
    }

    .brand-top{
      position:relative;
      z-index:2;
      text-align:center;
      padding-top:1rem;
      padding-bottom:5.5rem;
    }

    .brand-top h1{
      font-family:"Pinyon Script", cursive;
      font-size:clamp(3rem,8vw,5.5rem);
      font-weight:400;
      letter-spacing:.00em;
      color:#101010;
    }

    .editorial-card{
      position:relative;
      z-index:5;
      width:min(calc(100% - 2rem), var(--max-card));
      margin:-20rem auto 0;
      background:#efefee;
      box-shadow:var(--shadow);
      border:1px solid rgba(0,0,0,.05);
    }

    .card-inner{
      padding:0;
    }

    .mini-nav{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:1rem;
      padding:.95rem 1.25rem;
      background:rgba(255,255,255,.72);
      border-bottom:1px solid rgba(0,0,0,.04);
    }

    .mini-brand{
      font-family:"Cormorant Garamond",serif;
      font-size:1.1rem;
      letter-spacing:.02em;
      color:#111;
    }

    .mini-links{
      display:flex;
      gap:.85rem;
      flex-wrap:wrap;
      justify-content:center;
      align-items:center;
      font-size:.58rem;
      letter-spacing:.18em;
      text-transform:uppercase;
      color:#555;
    }

    .mini-links span{white-space:nowrap}

    .mini-nav-text{
      color:#111
    }

      padding:7.3rem 8% 5.8rem;
      text-align:center;
      background:#efefee;
      overflow:hidden;
    }

    .script-word{
      position:absolute;
      inset:auto 0 auto 0;
      top:2.6rem;
      text-align:center;
      font-family:"Parisienne",cursive;
      font-size:clamp(3.6rem,10.5vw,7.4rem);

      pointer-events:none;
      line-height:1;
      z-index:0;
      transform:translateX(-1%);

      z-index:2;

      letter-spacing:.24em;
      text-transform:uppercase;
      color:#333;
      margin-bottom:.9rem;

      line-height:1.92;
      color:#4d4d4d;
